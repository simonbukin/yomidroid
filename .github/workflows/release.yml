name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK + NDK + CMake
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;26.1.10909125
            cmake;3.22.1

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Compute release metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE="$(date -u +%Y-%m-%d)"
          TAG="build-${DATE}-${SHORT_SHA}"
          APK="yomidroid-${SHORT_SHA}.apk"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "apk=${APK}" >> "$GITHUB_OUTPUT"
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/${APK}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          APK: ${{ steps.meta.outputs.apk }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
        run: |
          NOTES=$(cat <<EOF
          Auto-built from \`main\` @ ${SHORT_SHA}.

          **Debug-signed** — sideload via \`adb install\` or by enabling "Install unknown apps" for your file manager. Cannot upgrade an existing Play Store install.

          On first launch, open Settings → Dictionaries to import a Yomitan ZIP or download from the recommended catalog.
          EOF
          )

          gh release create "${TAG}" \
            "dist/${APK}" \
            --title "Build ${SHORT_SHA}" \
            --target "${GITHUB_SHA}" \
            --notes "${NOTES}"
