name: Build & Release APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK + NDK + CMake
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;26.1.10909125
            cmake;3.22.1

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Compute APK metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE="$(date -u +%Y-%m-%d)"
          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              SUFFIX="pr${{ github.event.pull_request.number }}-${SHORT_SHA}"
              LABEL="PR #${{ github.event.pull_request.number }} · ${SHORT_SHA}"
              ;;
            push)
              SUFFIX="${DATE}-${SHORT_SHA}"
              LABEL="${DATE} · ${SHORT_SHA}"
              ;;
            *)
              # workflow_dispatch / non-main pushes — slugify the ref
              SLUG="$(echo "${GITHUB_REF_NAME}" | tr '/' '-' | tr -cd 'A-Za-z0-9._-')"
              SUFFIX="${SLUG}-${SHORT_SHA}"
              LABEL="${SLUG} · ${SHORT_SHA}"
              ;;
          esac
          APK="yomidroid-${SUFFIX}.apk"
          TAG="build-${DATE}-${SHORT_SHA}"
          {
            echo "short_sha=${SHORT_SHA}"
            echo "date=${DATE}"
            echo "suffix=${SUFFIX}"
            echo "apk=${APK}"
            echo "tag=${TAG}"
            echo "label=${LABEL}"
          } >> "$GITHUB_OUTPUT"
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/${APK}"
          ls -la dist/

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.apk }}
          path: dist/${{ steps.meta.outputs.apk }}
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          APK: ${{ steps.meta.outputs.apk }}
          LABEL: ${{ steps.meta.outputs.label }}
        run: |
          NOTES=$(cat <<EOF
          Auto-built from \`main\` @ ${LABEL}.

          **Debug-signed** — sideload via \`adb install\` or by enabling "Install unknown apps" for your file manager. Cannot upgrade an existing Play Store install.

          On first launch, open Settings → Dictionaries to import a Yomitan ZIP or download from the recommended catalog.
          EOF
          )

          gh release create "${TAG}" \
            "dist/${APK}" \
            --title "Yomidroid ${LABEL}" \
            --target "${GITHUB_SHA}" \
            --notes "${NOTES}"
